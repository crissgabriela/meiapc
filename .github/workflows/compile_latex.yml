name: Compile LaTeX Syllabus
on: [push]
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4 # Actualizado a v4
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3 # Versión estable para 2026
        with:
          root_file: Plan_Clases_MeIAPC_2026.tex
      - name: Upload PDF
        uses: actions/upload-artifact@v4 # ¡Esta es la corrección clave!
        with:
          name: Plan_Clases_2026
          path: Plan_Clases_MeIAPC_2026.pdf
